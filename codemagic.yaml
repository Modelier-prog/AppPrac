workflows:
  android-workflow:
    name: Build Android APK
    max_build_duration: 60
    environment:
      node: latest
      ruby: latest
      android:
        build-tools: "33.0.0"
        target-sdk: 33
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build APK
        script: cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk